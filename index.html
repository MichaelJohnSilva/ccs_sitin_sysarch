<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
  /* GENERAL STYLES */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  position: relative;
}

/* NAVBAR STYLES */
.topnav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 15px 40px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  position: sticky;
  top: 0;
  z-index: 1000;
}

#title {
  display: flex;
  align-items: center;
  gap: 15px;
  color: white;
  font-weight: 700;
  font-size: 20px;
}

#uc {
  height: 50px;
  width: 50px;
  border-radius: 50%;
  transition: transform 0.4s ease;
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

#uc:hover {
  transform: rotate(360deg) scale(1.1);
}

.topnavInside ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  gap: 5px;
  transition: transform 0.3s ease-in-out;
}

.topnavInside li {
  position: relative;
}

.topnavInside a {
  display: block;
  color: white;
  padding: 12px 20px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.3s ease;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}

.topnavInside a::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 3px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  transition: all 0.3s ease;
  transform: translateX(-50%);
  border-radius: 2px;
}

.topnavInside a:hover {
  color: white;
  background: rgba(255,255,255,0.1);
}

.topnavInside a:hover::before {
  width: 80%;
}

.topnavInside a.active {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

/* DROPDOWN MENU */
.dropdown-content {
  display: none;
  position: absolute;
  top: 50px;
  left: 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-width: 200px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  border-radius: 12px;
  overflow: hidden;
  transform: translateY(-10px);
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 11000;
  list-style: none;
  padding: 8px 0;
}

.dropdown:hover .dropdown-content {
  display: block;
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}

.dropdown-content li {
  margin: 0;
  padding: 0;
}

.dropdown-content li a {
  display: block;
  padding: 12px 20px;
  font-size: 14px;
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  transition: all 0.3s ease;
  border-left: 3px solid transparent;
}

.dropdown-content li a:hover {
  background: rgba(255,255,255,0.1);
  border-left: 3px solid #667eea;
  padding-left: 25px;
}

/* MAIN CONTENT STYLES */
.content {
  max-width: 800px;
  margin: 50px auto;
  padding: 40px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  text-align: center;
  position: relative;
  z-index: 1; /* lower than navbar */
}

@keyframes fadeInContent {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

.content h1 {
  font-size: 36px;
  color: #333;
  margin-bottom: 20px;
  font-weight: 600;
  transition: transform 0.3s ease-in-out;
}

.content h1:hover {
  transform: translateY(-5px);
}

.content p {
  font-size: 18px;
  color: #777;
  margin-bottom: 40px;
}

/* BUTTON GROUP */
.button-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  transition: opacity 0.3s ease-in-out;
}

.button-group button,
.button-group a {
  padding: 15px 25px;
  font-size: 18px;
  font-weight: 500;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s ease, transform 0.3s ease-in-out;
  text-decoration: none;
  display: inline-block;
  width: 200px;
  text-align: center;
}

.button-group button {
  background-color: #007bff;
  color: white;
  border: none;
}

.button-group a {
  background-color: #6c757d;
  color: white;
}

.button-group button:hover {
  background-color: #0056b3;
  transform: translateY(-5px);
}

.button-group a:hover {
  background-color: #545b62;
  transform: translateY(-5px);
}

/* Watermark for index.html */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 400px;
  background: url('ucmainccslogo.png') no-repeat center center;
  background-size: contain;
  opacity: 0.1;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
}

/* MOBILE RESPONSIVE STYLES */
@media (max-width: 768px) {
  .topnav {
    flex-direction: column;
    padding: 20px;
  }

  .topnavInside ul {
    flex-direction: column;
    width: 100%;
  }

  .topnavInside a {
    padding: 12px;
  }

  .content {
    width: 90%;
    padding: 30px;
  }

  .button-group {
    flex-direction: column;
    gap: 20px;
  }

  .button-group button,
  .button-group a {
    width: 100%;
    padding: 12px;
  }
}
    </style>
</head>
