<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCS | Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="uclogo.png" type="image/png" />
  <style>
/* GENERAL STYLES */
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #eef2f7, #e3e9f1);
  position: relative;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

/* Navbar Transition */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* NAVBAR STYLES */
.topnav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #4a4a4a, #2e2e2e);
  padding: 10px 30px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  position: relative;     /* establishes stacking context */
  z-index: 10000;        /* very high so it sits on top */
  perspective: 700px;    /* for 3D dropdown effect */
}

#title {
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
  font-weight: bold;
  font-size: 20px;
}

#uc {
  height: 45px;
  width: 45px;
  border-radius: 50%;
}

.topnavInside ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  gap: 25px;
}

.topnavInside li {
  position: relative;
  perspective: 600px;  /* for child 3D */
}

.topnavInside a {
  display: block;
  color: white;
  padding: 14px 18px;
  text-decoration: none;
  font-size: 16px;
  font-weight: 500;
  transition: color 0.3s, background-color 0.3s, transform 0.3s;
  transform-style: preserve-3d;
}

.topnavInside a:hover {
  background-color: #0056b3;
  color: white;
  transform: rotateX(0deg) translateZ(5px);
}

.topnavInside a.active {
  background-color: #003f7f;
  color: white;
}

/* DROPDOWN MENU */
.dropdown-content {
  display: none;
  position: absolute;
  top: 38px;
  right: 0;  /* align to right edge of dropdown button */
  background: #fff;
  min-width: 160px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  border-radius: 10px;
  overflow: hidden;
  transform: rotateX(-20deg) translateY(-6px);
  transform-origin: top center;
  opacity: 0;
  transition: transform 0.35s ease, opacity 0.35s ease;
  pointer-events: none;
  list-style: none;
  padding: 0;
  z-index: 11000; /* above navbar */
}

.dropdown:hover .dropdown-content {
  display: block;
  transform: rotateX(0deg) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

.dropdown-content li {
  margin: 0;
  padding: 0;
}

.dropdown-content li a {
  display: block;
  padding: 10px 15px;
  font-size: 14px;
  color: #333;
  text-decoration: none;
  transition: background-color 0.3s, transform 0.3s;
  transform-style: preserve-3d;
}

.dropdown-content li a:hover {
  background-color: #f1f1f1;
  transform: translateZ(5px);
}

/* MAIN CONTENT STYLES */
.content {
  max-width: 600px;
  margin: 50px auto;
  padding: 40px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
  text-align: center;
  opacity: 0;
  animation: fadeInContent 1s forwards;
  position: relative;
  z-index: 1;  /* lower than navbar to allow dropdown over it */
}

@keyframes fadeInContent {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

.content h1 {
  font-size: 36px;
  color: #333;
  margin-bottom: 20px;
  font-weight: 600;
  transition: transform 0.3s ease-in-out;
}

.content h1:hover {
  transform: translateY(-5px);
}

.content p {
  font-size: 18px;
  color: #777;
  margin-bottom: 40px;
}

/* FORM STYLES */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
}

.form-group {
  width: 100%;
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: 14px;
  color: #333;
  margin-bottom: 8px;
  font-weight: 600;
}

.form-group input {
  padding: 12px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 100%;
  transition: 0.3s;
}

.form-group input:focus {
  border-color: #007bff;
  box-shadow: 0 0 6px rgba(0,123,255,0.3);
  outline: none;
}

.login-button {
  width: 100%;
  padding: 12px;
  background-color: #007bff;
  color: white;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.login-button:hover {
  background-color: #0056b3;
  transform: translateY(-5px);
}

/* FOOTER */
.footer {
  padding: 20px 0;
  text-align: center;
  background: #2e2e2e;
  color: white;
}

/* Watermark */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 400px;
  background: url('ucmainccslogo.png') no-repeat center center;
  background-size: contain;
  opacity: 0.1;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
}

/* MOBILE RESPONSIVE STYLES */
@media (max-width: 768px) {
  .topnav {
    flex-direction: column;
    padding: 20px;
  }

  .topnavInside ul {
    flex-direction: column;
    width: 100%;
  }

  .topnavInside a {
    padding: 12px;
  }

  .content {
    width: 90%;
    padding: 30px;
  }

  .button-group {
    flex-direction: column;
    gap: 20px;
  }

  .button-group button,
  .button-group a {
    width: 100%;
    padding: 12px;
  }
}

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="topnav">
    <div id="title">
      <img src="uclogo.png" alt="uclogo" id="uc">
      <span>College of Computer Studies Sit-in Monitoring System</span>
    </div>
    <div class="topnavInside">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li class="dropdown">
          <a href="#">Community &#9662;</a>
          <ul class="dropdown-content">
            <li><a href="events.html">Events</a></li>
            <li><a href="clubs.html">Clubs</a></li>
            <li><a href="forum.html">Forum</a></li>
          </ul>
        </li>
        <li><a href="#">About</a></li>
        <li><a class="active" href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <h1>Login to CCS Sit-in Monitoring System</h1>
    <p>Enter your credentials to access the system.</p>

    <!-- LOGIN FORM -->
    <form class="login-form" action="login.php" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="login-button">Login</button>
    </form>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>&copy; 2026 College of Computer Studies. All rights reserved.</p>
  </div>

</body>
</html>
