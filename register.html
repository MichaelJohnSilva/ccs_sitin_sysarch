<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCS | Register</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="uclogo.png" type="image/png" />
  <style>
/* ===== GENERAL STYLES ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #eef2f7, #e3e9f1);
  min-height: 100vh;
  position: relative;
  opacity: 0;
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* ===== NAVBAR ===== */
.topnav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
  padding: 12px 28px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  position: relative;
  z-index: 1000;
  perspective: 700px; /* 3D effect */
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#title {
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
  font-weight: bold;
  font-size: 20px;
}

#uc {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.topnavInside ul {
  list-style: none;
  display: flex;
  gap: 25px;
  margin: 0;
  padding: 0;
}

.topnavInside li {
  position: relative;
}

.topnavInside a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 12px 16px;
  font-weight: 500;
  border-radius: 6px;
  transition: all 0.3s ease;
}

.topnavInside a:hover,
.topnavInside a.active {
  background: #007bff;
  transform: translateY(-2px) scale(1.05);
}

/* ===== DROPDOWN MENU ===== */
.dropdown-content {
  display: none;
  position: absolute;
  top: 50px;
  left: 0;
  min-width: 180px;
  background: rgba(255,255,255,0.95);
  border-radius: 10px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  opacity: 0;
  transform: rotateX(-20deg) translateY(-10px);
  transform-origin: top center;
  transition: all 0.35s ease;
  pointer-events: none;
  list-style: none;
  padding: 0;
  z-index: 1100;
}

.dropdown:hover .dropdown-content {
  display: block;
  opacity: 1;
  transform: rotateX(0deg) translateY(0);
  pointer-events: auto;
}

.dropdown-content li a {
  display: block;
  padding: 12px 18px;
  color: #333;
  font-weight: 500;
  transition: all 0.3s ease;
}

.dropdown-content li a:hover {
  background: #f1f1f1;
  transform: translateX(4px);
}

/* ===== MAIN CONTENT ===== */
.content {
  max-width: 720px;
  margin: 60px auto;
  padding: 50px 35px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  text-align: center;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.8s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

.content h1 {
  font-size: 34px;
  font-weight: 700;
  color: #333;
  margin-bottom: 15px;
}

.content p {
  font-size: 16px;
  color: #555;
  margin-bottom: 40px;
}

/* ===== REGISTER FORM ===== */
.register-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 30px;
  margin-bottom: 20px;
}

.form-group {
  position: relative;
  display: flex;
  flex-direction: column-reverse;
}

.form-group input,
.form-group select {
  padding: 14px 12px 14px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 100%;
  font-size: 15px;
  transition: all 0.3s ease;
  background: transparent;
}

.form-group label {
  position: absolute;
  top: 14px;
  left: 12px;
  font-size: 15px;
  color: #777;
  font-weight: 500;
  pointer-events: none;
  transition: all 0.3s ease;
}

.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label,
.form-group select:focus + label,
.form-group select:not([value=""]) + label {
  top: -10px;
  font-size: 12px;
  color: #007bff;
  background: white;
  padding: 0 4px;
}

/* Full width form group */
.form-group.full-width {
  grid-column: 1 / -1;
}

/* BUTTON GROUP */
.button-group {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  gap: 20px;
  margin-top: 20px;
}

.button-group button,
.button-group a {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 10px;
  border: none;
  color: #fff;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.35s ease;
}

.button-group button {
  background: linear-gradient(135deg, #007bff, #0056b3);
  box-shadow: 0 6px 15px rgba(0,123,255,0.3);
}

.button-group button:hover {
  background: linear-gradient(135deg, #0056b3, #003f7f);
  transform: translateY(-3px) scale(1.03);
}

.button-group a {
  background: #6c757d;
}

.button-group a:hover {
  background: #5a6268;
  transform: translateY(-3px) scale(1.02);
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 20px 0;
  background: #2e2e2e;
  color: white;
  margin-top: 60px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* ===== WATERMARK ===== */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 400px;
  background: url('ucmainccslogo.png') no-repeat center center;
  background-size: contain;
  opacity: 0.08;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 0;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .register-form {
    display: block;
  }

  .button-group {
    flex-direction: column;
  }

  .button-group button,
  .button-group a {
    width: 100%;
  }
}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="topnav">
    <div id="title">
      <img src="uclogo.png" alt="uclogo" id="uc">
      <span>College of Computer Studies Sit-in Monitoring System</span>
    </div>
    <div class="topnavInside">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li class="dropdown">
          <a href="#">Community &#9662;</a>
          <ul class="dropdown-content">
            <li><a href="events.html">Events</a></li>
            <li><a href="clubs.html">Clubs</a></li>
            <li><a href="forum.html">Forum</a></li>
          </ul>
        </li>
        <li><a href="about.html">About</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a class="active" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <h1>Create an Account</h1>
    <p>Sign up to access the CCS Sit-in Monitoring System.</p>

    <!-- REGISTER FORM -->
    <form class="register-form" action="register.php" method="POST">
      <div class="form-group">
        <label for="idNumber">ID Number</label>
        <input type="text" id="idNumber" name="idNumber" required>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>
      </div>

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>
      </div>

      <div class="form-group">
        <label for="middleName">Middle Name</label>
        <input type="text" id="middleName" name="middleName">
      </div>

      <div class="form-group">
        <label for="course">Course</label>
        <select id="course" name="course" required>
          <option value="">-- Select Course --</option>
          <option value="BS Accountancy">BS Accountancy</option>
          <option value="BS Business Administration">BS Business Administration</option>
          <option value="BS Computer Science">BS Computer Science</option>
          <option value="BS Information Technology">BS Information Technology</option>
          <option value="BS Computer Engineering">BS Computer Engineering</option>
          <option value="BS Criminology">BS Criminology</option>
          <option value="BS Civil Engineering">BS Civil Engineering</option>
          <option value="BS Electrical Engineering">BS Electrical Engineering</option>
          <option value="BS Mechanical Engineering">BS Mechanical Engineering</option>
          <option value="BS Industrial Engineering">BS Industrial Engineering</option>
          <option value="BS Commerce">BS Commerce</option>
          <option value="BS Hotel & Restaurant Management">BS Hotel & Restaurant Management</option>
          <option value="BS Tourism Management">BS Tourism Management</option>
          <option value="BS Elementary Education">BS Elementary Education</option>
          <option value="BS Secondary Education">BS Secondary Education</option>
          <option value="BS Customs Administration">BS Customs Administration</option>
          <option value="BS Industrial Psychology">BS Industrial Psychology</option>
          <option value="BS Real Estate Management">BS Real Estate Management</option>
          <option value="BS Office Administration">BS Office Administration</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="form-group">
        <label for="repeatPassword">Repeat Password</label>
        <input type="password" id="repeatPassword" name="repeatPassword" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="address">
      </div>

      <!-- BUTTONS -->
      <div class="button-group">
        <a href="index.html" class="back-btn">Back</a>
        <button type="submit">Register</button>
      </div>
    </form>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>&copy; 2026 College of Computer Studies. All rights reserved.</p>
  </div>

</body>
</html>
