  <style>
/* ===== GENERAL STYLES ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #eef2f7, #e3e9f1);
  min-height: 100vh;
  position: relative;
  opacity: 0;
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* ===== MAIN CONTENT ===== */
.content {
  max-width: 720px;
  margin: 60px auto;
  padding: 50px 35px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  text-align: center;
  animation: fadeUp 0.8s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

.content h1 {
  font-size: 34px;
  font-weight: 700;
  color: #333;
  margin-bottom: 15px;
}

.content p {
  font-size: 16px;
  color: #555;
  margin-bottom: 40px;
}

/* ===== REGISTER FORM ===== */
.register-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 30px;
  margin-bottom: 20px;
}

/* FORM GROUP */
.form-group {
  position: relative;
  display: flex;
  flex-direction: column-reverse;
  margin-bottom: 20px;
}

/* INPUT & SELECT */
.form-group input,
.form-group select {
  padding: 18px 12px 6px 12px; /* top padding makes room for label */
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 100%;
  font-size: 15px;
  transition: all 0.3s ease;
  background: #fff;
  box-sizing: border-box;
}

/* Remove default arrow in select */
.form-group select {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  cursor: pointer;
}

/* LABEL */
.form-group label {
  position: absolute;
  left: 12px;
  top: 18px; /* aligns with input text */
  font-size: 15px;
  color: #777;
  font-weight: 500;
  pointer-events: none;
  background: white;
  padding: 0 4px;
  transition: all 0.3s ease;
}

/* FLOATING LABEL ON FOCUS OR VALUE */
.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label,
.form-group select:focus + label,
.form-group select:not([value=""]) + label {
  top: -8px;
  font-size: 12px;
  color: #007bff;
  background: #fff;
  padding: 0 4px;
}

/* Placeholder option hidden after selection (select only) */
.form-group select option[hidden] {
  display: none;
}

/* BUTTON GROUP */
.button-group {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  gap: 20px;
  margin-top: 20px;
}

.button-group button,
.button-group a {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 10px;
  border: none;
  color: #fff;
  cursor: pointer;
  text-align: center;
  transition: all 0.35s ease;
}

.button-group button {
  background: linear-gradient(135deg, #007bff, #0056b3);
  box-shadow: 0 6px 15px rgba(0,123,255,0.3);
}

.button-group button:hover {
  background: linear-gradient(135deg, #0056b3, #003f7f);
  transform: translateY(-3px) scale(1.03);
}

.button-group a {
  background: #6c757d;
}

.button-group a:hover {
  background: #5a6268;
  transform: translateY(-3px) scale(1.02);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px 0;
  background: #2e2e2e;
  color: white;
  margin-top: 60px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .register-form {
    display: block;
  }
  .button-group {
    flex-direction: column;
  }
  .button-group button,
  .button-group a {
    width: 100%;
  }
}
  </style>
</head>

 <!-- MAIN CONTENT -->
<div class="content">
  <h1>Create an Account</h1>
  <p>Sign up to access the CCS Sit-in Monitoring System.</p>

  <!-- REGISTER FORM -->
  <form class="register-form" action="register.php" method="POST">
    <div class="form-group">
      <input type="text" id="idNumber" name="idNumber" placeholder=" " required>
      <label for="idNumber">ID Number</label>
    </div>

    <div class="form-group">
      <input type="text" id="lastName" name="lastName" placeholder=" " required>
      <label for="lastName">Last Name</label>
    </div>

    <div class="form-group">
      <input type="text" id="firstName" name="firstName" placeholder=" " required>
      <label for="firstName">First Name</label>
    </div>

    <div class="form-group">
      <input type="text" id="middleName" name="middleName" placeholder=" ">
      <label for="middleName">Middle Name</label>
    </div>

    <div class="form-group">
      <select id="course" name="course" required>
        <option value="" disabled selected hidden>-- Select Course --</option>
        <option value="BS Accountancy">BS Accountancy</option>
        <option value="BS Business Administration">BS Business Administration</option>
        <option value="BS Computer Science">BS Computer Science</option>
        <option value="BS Information Technology">BS Information Technology</option>
        <option value="BS Computer Engineering">BS Computer Engineering</option>
        <option value="BS Criminology">BS Criminology</option>
        <option value="BS Civil Engineering">BS Civil Engineering</option>
        <option value="BS Electrical Engineering">BS Electrical Engineering</option>
        <option value="BS Mechanical Engineering">BS Mechanical Engineering</option>
        <option value="BS Industrial Engineering">BS Industrial Engineering</option>
        <option value="BS Commerce">BS Commerce</option>
        <option value="BS Hotel & Restaurant Management">BS Hotel & Restaurant Management</option>
        <option value="BS Tourism Management">BS Tourism Management</option>
        <option value="BS Elementary Education">BS Elementary Education</option>
        <option value="BS Secondary Education">BS Secondary Education</option>
        <option value="BS Customs Administration">BS Customs Administration</option>
        <option value="BS Industrial Psychology">BS Industrial Psychology</option>
        <option value="BS Real Estate Management">BS Real Estate Management</option>
        <option value="BS Office Administration">BS Office Administration</option>
      </select>
      <label for="course">Course</label>
    </div>

    <div class="form-group">
      <input type="password" id="password" name="password" placeholder=" " required>
      <label for="password">Password</label>
    </div>

    <div class="form-group">
      <input type="password" id="repeatPassword" name="repeatPassword" placeholder=" " required>
      <label for="repeatPassword">Repeat Password</label>
    </div>

    <div class="form-group">
      <input type="email" id="email" name="email" placeholder=" " required>
      <label for="email">Email</label>
    </div>

    <div class="form-group">
      <input type="text" id="address" name="address" placeholder=" ">
      <label for="address">Address</label>
    </div>

    <!-- BUTTONS -->
    <div class="button-group">
      <a href="index.html" class="back-btn">Back</a>
      <button type="submit">Register</button>
    </div>
  </form>
